
spring.application.name=track-that-went-cold
spring.rsocket.server.transport=websocket
spring.rsocket.server.mapping-path=/rsocket
# Spring Boot 4.x WebFluxServerConfiguration overwrites rsocket-transport-netty's
# default maxFramePayloadLength (16MB) with reactor-netty's default (65KB).
# Restore it to the RSocket 24-bit protocol max so WebSocket isn't the bottleneck.
spring.rsocket.server.spec.max-frame-payload-length=16777215
